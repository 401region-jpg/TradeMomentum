name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-and-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check runner.py broker/broker_paper.py backtest/backtester.py strategy/momentum.py tests

      - name: Black
        run: black --check runner.py broker/broker_paper.py backtest/backtester.py strategy/momentum.py tests/test_strategy.py tests/test_backtester.py tests/test_risk_manager.py

      - name: Mypy
        run: mypy --disable-error-code import-untyped runner.py broker/broker_paper.py backtest/backtester.py risk/risk_manager.py strategy/momentum.py

      - name: Pytest
        run: pytest -q
